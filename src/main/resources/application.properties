# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8080

# ===================================================================
# DATABASE CONFIGURATION (In-Memory H2)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:bankingdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=SA
spring.datasource.password=

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
# Automatically updates the database schema based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Shows the SQL queries in the console (great for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# FIXES: Removed the manual H2 dialect line to fix the HHH90000025 warning

# FIXES: Disables Open-In-View to clear the JpaWebConfiguration warning
spring.jpa.open-in-view=false

# ===================================================================
# H2 CONSOLE CONFIGURATION
# ===================================================================
# Enables the web interface at http://localhost:8080/h2-console
spring.h2.console.enabled=true
# Fixes access issues if you use frames or test with security later
spring.h2.console.settings.web-allow-others=false

# Force data.sql to run AFTER Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true

# ===================================================================
# SPRING AI OLLAMA CONFIGURATION
# ===================================================================
# Directs Spring Boot to talk to your local llama3.2 model
spring.ai.ollama.chat.options.model=llama3.2